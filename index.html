<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sahityolsav Results 2026</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Result Board home">
        <span class="brand-mark">SSF</span>
        <span>
          <strong>Sahityolsav Results 2026</strong>
          <small>Live programs and posters</small>
        </span>
      </a>
      <nav class="nav">
        <a href="#results">Results</a>
        <a href="#news">News</a>
        <a href="#schedules">Schedules</a>
        <a class="admin-link" href="admin.html">Admin</a>
      </nav>
    </header>

    <main>
      <section class="hero">
        <div class="hero-panel">
          <span>Latest update</span>
          <strong id="lastUpdated">Loading...</strong>
        </div>
        <div class="hero-image-wrap">
          <img id="heroImage" class="hero-image" onerror="handlePosterImageError(this)" alt="Result Board update banner" hidden>
        </div>
      </section>
<br></br>
      <section class="controls" aria-label="Search and filters">
        <label class="search-box">
          <span>Search</span>
          <input id="searchInput" type="search" placeholder="Search by Program Name / Result / Venue">
        </label>
        <label>
          <span>Category</span>
          <select id="categoryFilter">
            <option value="all">All categories</option>
          </select>
        </label>
        <label>
          <span>Status</span>
          <select id="statusFilter">
            <option value="all">All statuses</option>
            <option value="Published">Published</option>
            <option value="Upcoming">Upcoming</option>
            <option value="Review">Review</option>
          </select>
        </label>
      </section>

      <section class="layout">
        <div>
          <div class="section-heading" id="results">
            <div>
              <p class="eyebrow">Result posters</p>
              <h2>Program List</h2>
            </div>
            <p id="resultCount">0 programs</p>
          </div>
          <div id="programGrid" class="program-grid" aria-live="polite"></div>
        </div>

        <aside class="side-column">
          <section class="panel" id="news">
            <div class="section-heading">
              <div>
                <p class="eyebrow">Latest Updates</p>
                <h2>News Corner</h2>
              </div>
            </div>
            <div id="newsList" class="news-list"></div>
          </section>

          <section class="panel" id="schedules">
            <div class="section-heading">
              <div>
                <p class="eyebrow">programs</p>
                <h2>Schedules</h2>
              </div>
            </div>
            <div id="scheduleList" class="schedule-list"></div>
          </section>
        </aside>
      </section>
    </main>

    <dialog id="posterDialog" class="poster-dialog">
      <button class="icon-button dialog-close" id="closeDialog" type="button" aria-label="Close">x</button>
      <div id="dialogPoster"></div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
